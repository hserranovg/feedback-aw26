<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="LOSAN MEN — AW26 End of Season Feedback">
<title>LOSAN — Feedback AW26</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--surface:#fafafa;--text:#0a0a0a;--muted:#8a8a8a;--line:#e8e8e8;--line-dark:#d0d0d0;--danger:#c8102e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;}
.header{padding:1.25rem 2rem;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100;gap:1rem;}
.logo-wordmark{font-size:1.15rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--text);flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:1.25rem;}
.header-meta{font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.lang-switcher{display:flex;}
.lang-btn{font-family:'DM Sans',sans-serif;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;border:1px solid var(--line-dark);background:transparent;color:var(--muted);padding:0.3rem 0.65rem;cursor:pointer;transition:all 0.15s;margin-left:-1px;}
.lang-btn:first-child{margin-left:0;}
.lang-btn:hover{background:var(--surface);color:var(--text);}
.lang-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);z-index:1;position:relative;}
.progress-bar{height:2px;background:var(--line);width:100%;position:sticky;top:62px;z-index:99;}
.progress-fill{height:100%;background:var(--text);width:0%;transition:width 0.4s ease;}
.form-body{max-width:680px;width:100%;margin:0 auto;padding:3.5rem 2rem 8rem;display:flex;flex-direction:column;}
.intro{padding-bottom:3rem;border-bottom:1px solid var(--line);margin-bottom:3rem;}
.eyebrow{font-size:0.62rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);margin-bottom:0.85rem;display:block;}
.intro-title{font-size:clamp(1.65rem,4vw,2.4rem);font-weight:400;line-height:1.2;letter-spacing:-0.02em;margin-bottom:1.25rem;}
.intro-title em{font-style:italic;font-weight:300;}
.intro-desc{font-size:0.88rem;color:var(--muted);line-height:1.75;max-width:520px;}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);margin-bottom:3.5rem;}
.meta-cell{padding:1rem 1.25rem;border-right:1px solid var(--line);}
.meta-cell:nth-child(2){border-right:none;}
.meta-cell:nth-child(3),.meta-cell:nth-child(4){border-top:1px solid var(--line);}
.meta-cell:nth-child(4){border-right:none;}
.meta-cell label{display:block;font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:0.45rem;}
.meta-cell input{width:100%;border:none;border-bottom:1px solid var(--line-dark);background:transparent;font-family:'DM Sans',sans-serif;font-size:0.9rem;color:var(--text);outline:none;padding:0.3rem 0;transition:border-color 0.2s;}
.meta-cell input:focus{border-bottom-color:var(--text);}
.meta-cell input::placeholder{color:var(--muted);}
.section{padding:2.75rem 0;border-bottom:1px solid var(--line);}
.section:last-of-type{border-bottom:none;}
.s-eyebrow{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:0.65rem;display:flex;align-items:center;gap:0.75rem;}
.key-badge{font-size:0.56rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--danger);border:1px solid var(--danger);padding:0.12rem 0.45rem;}
.s-title{font-size:1.2rem;font-weight:400;line-height:1.35;letter-spacing:-0.01em;margin-bottom:0.6rem;}
.s-title em{font-style:italic;font-weight:300;}
.s-hint{font-size:0.83rem;color:var(--muted);margin-bottom:2rem;line-height:1.55;}
.rating-block{display:flex;flex-direction:column;border-top:1px solid var(--line);border-left:1px solid var(--line);}
.rating-row{display:flex;align-items:center;border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
.rating-label{flex:1;padding:0.8rem 1rem;font-size:0.86rem;}
.rating-opts{display:flex;border-left:1px solid var(--line);}
.rating-opts input[type="radio"]{display:none;}
.rating-opts label{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:500;color:var(--muted);cursor:pointer;border-right:1px solid var(--line);transition:all 0.15s;user-select:none;}
.rating-opts label:last-child{border-right:none;}
.rating-opts label:hover{background:var(--surface);color:var(--text);}
.rating-opts input[type="radio"]:checked + label{background:var(--text);color:var(--bg);}
.family-grid{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line);border-left:1px solid var(--line);margin-bottom:0;}
.fam-row{display:flex;align-items:center;border-right:1px solid var(--line);border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.12s;user-select:none;}
.fam-row:hover{background:var(--surface);}
.fam-indicator{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:600;color:var(--muted);border-right:1px solid var(--line);flex-shrink:0;transition:all 0.15s;}
.fam-row.ranked .fam-indicator{background:var(--text);color:var(--bg);}
.fam-row input[type="checkbox"]{display:none;}
.fam-name{padding:0 0.9rem;font-size:0.86rem;flex:1;line-height:1.3;}
.check-group{display:flex;flex-direction:column;border-top:1px solid var(--line);border-left:1px solid var(--line);}
.check-group-2col{display:grid;grid-template-columns:1fr 1fr;}
.check-row{display:flex;align-items:center;border-right:1px solid var(--line);border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.12s;user-select:none;}
.check-row:hover{background:var(--surface);}
.check-row input[type="checkbox"]{display:none;}
.check-ind{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600;color:var(--muted);border-right:1px solid var(--line);flex-shrink:0;transition:all 0.15s;}
.check-row input[type="checkbox"]:checked ~ .check-ind{background:var(--text);color:var(--bg);}
.check-row input[type="checkbox"]:checked ~ .check-ind::before{content:'✓';}
.check-label{padding:0 0.9rem;font-size:0.86rem;flex:1;}
.num-list{display:flex;flex-direction:column;border-top:1px solid var(--line);border-left:1px solid var(--line);}
.num-row{display:flex;align-items:center;border-right:1px solid var(--line);border-bottom:1px solid var(--line);}
.num-badge{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:600;color:var(--muted);border-right:1px solid var(--line);flex-shrink:0;}
.num-row input[type="text"]{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);outline:none;padding:0 1rem;height:42px;}
.num-row input[type="text"]::placeholder{color:var(--muted);}
.num-row input[type="text"]:focus{background:var(--surface);}
.textarea-wrap{margin-top:1.5rem;}
.field-label{display:block;font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:0.55rem;}
.textarea-field{width:100%;border:1px solid var(--line-dark);background:var(--surface);padding:0.9rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);outline:none;resize:vertical;min-height:90px;transition:border-color 0.2s;line-height:1.65;}
.textarea-field:focus{border-color:var(--text);}
.textarea-field::placeholder{color:var(--muted);}
.input-wrap{margin-top:1.25rem;}
.input-line{width:100%;border:none;border-bottom:1px solid var(--line-dark);background:transparent;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);outline:none;padding:0.55rem 0;transition:border-color 0.2s;}
.input-line:focus{border-bottom-color:var(--text);}
.input-line::placeholder{color:var(--muted);}
.yesno-row{display:flex;border:1px solid var(--line-dark);width:fit-content;margin:1rem 0 1.25rem;}
.yesno-row input[type="radio"]{display:none;}
.yesno-row label{padding:0.6rem 1.35rem;font-size:0.76rem;font-weight:500;letter-spacing:0.06em;cursor:pointer;border-right:1px solid var(--line-dark);color:var(--muted);transition:all 0.15s;white-space:nowrap;}
.yesno-row label:last-child{border-right:none;}
.yesno-row input[type="radio"]:checked + label{background:var(--text);color:var(--bg);}
.actions-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--line);padding:1.1rem 2rem;display:flex;align-items:center;gap:0.85rem;z-index:50;}
.btn{font-family:'DM Sans',sans-serif;font-size:0.84rem;font-weight:500;padding:0.75rem 1.6rem;border:1px solid var(--line-dark);background:var(--bg);color:var(--text);cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;}
.btn:hover{background:var(--surface);}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text);}
.btn-primary:hover{opacity:0.82;}
.btn-ghost{border:none;background:none;color:var(--muted);padding:0.75rem 0;}
.btn-ghost:hover{color:var(--text);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,10,0.75);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.modal{background:var(--bg);max-width:620px;width:92%;max-height:84vh;overflow-y:auto;border:1px solid var(--line);}
.modal-head{padding:1.15rem 1.6rem;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg);}
.modal-head h2{font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;font-weight:500;}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);line-height:1;padding:0;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:1.5rem 1.6rem;}
.modal-note{font-size:0.8rem;color:var(--muted);line-height:1.65;margin-bottom:1rem;}
.modal-pre{white-space:pre-wrap;font-family:'DM Sans',sans-serif;font-size:0.75rem;line-height:1.75;color:var(--text);background:var(--surface);padding:1.15rem;max-height:360px;overflow-y:auto;border:1px solid var(--line);}
.modal-foot{padding:0.9rem 1.6rem;border-top:1px solid var(--line);display:flex;gap:0.7rem;flex-wrap:wrap;position:sticky;bottom:0;background:var(--bg);}
.modal-foot .btn{font-size:0.78rem;padding:0.65rem 1.3rem;}
@media(max-width:580px){
  .meta-grid{grid-template-columns:1fr;}
  .meta-cell:nth-child(2){border-right:none;}
  .meta-cell:nth-child(3),.meta-cell:nth-child(4){border-top:1px solid var(--line);}
  .family-grid,.check-group-2col{grid-template-columns:1fr;}
  .form-body{padding:2.5rem 1.25rem 8rem;}
  .header{padding:1rem 1.25rem;}
  .actions-bar{padding:0.9rem 1.25rem;flex-wrap:wrap;}
  .lang-btn{padding:0.25rem 0.5rem;}
  .header-meta{display:none;}
}
/* ── SUBMIT SUCCESS OVERLAY ── */
.submit-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:2rem;}
.submit-overlay.active{display:flex;}
.submit-icon{font-size:2.5rem;margin-bottom:1.5rem;}
.submit-title{font-size:clamp(1.4rem,4vw,2rem);font-weight:400;letter-spacing:-0.02em;margin-bottom:0.75rem;}
.submit-desc{font-size:0.9rem;color:var(--muted);line-height:1.65;max-width:400px;margin-bottom:2.5rem;}
/* ── ADMIN VIEW ── */
#admin-view{display:none;min-height:100vh;}
.admin-header{padding:1.25rem 2rem;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:1rem;background:var(--bg);}
.admin-badge{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--danger);border:1px solid var(--danger);padding:0.15rem 0.5rem;margin-left:0.75rem;}
.admin-body{max-width:780px;margin:0 auto;padding:3rem 2rem 6rem;}
.admin-section-title{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:1.25rem;}
.admin-pre{white-space:pre-wrap;font-family:'DM Sans',sans-serif;font-size:0.78rem;line-height:1.8;color:var(--text);background:var(--surface);padding:1.5rem;border:1px solid var(--line);max-height:70vh;overflow-y:auto;}
.admin-actions{display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1.25rem;}
.admin-note{font-size:0.75rem;color:var(--muted);margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--line);line-height:1.65;}
@media(max-width:580px){
  .admin-header{padding:1rem 1.25rem;}
  .admin-body{padding:2rem 1.25rem 5rem;}
}
@media print{
  .actions-bar,.modal-overlay,.progress-bar,.lang-switcher{display:none!important;}
  .header{position:static;}
}
</style>
</head>
<body>

<header class="header">
  <span class="logo-wordmark">LOSAN</span>
  <div class="header-right">
    <span class="header-meta" id="hd-meta"></span>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="es" onclick="setLang('es')">ES</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    </div>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<main class="form-body">

  <div class="intro">
    <span class="eyebrow" data-i18n="intro_eyebrow"></span>
    <h1 class="intro-title" data-i18n-html="intro_title"></h1>
    <p class="intro-desc" data-i18n="intro_desc"></p>
  </div>

  <div class="meta-grid">
    <div class="meta-cell"><label data-i18n="lbl_season"></label><input type="text" id="m_temporada" value="AW26"></div>
    <div class="meta-cell"><label data-i18n="lbl_agent"></label><input type="text" id="m_agente" data-i18n-placeholder="ph_agent"></div>
    <div class="meta-cell"><label data-i18n="lbl_country"></label><input type="text" id="m_pais" data-i18n-placeholder="ph_country"></div>
    <div class="meta-cell"><label data-i18n="lbl_date"></label><input type="date" id="m_fecha"></div>
  </div>

  <!-- S1 -->
  <div class="section" data-sec="1">
    <p class="s-eyebrow" data-i18n="s1_eyebrow"></p>
    <h2 class="s-title" data-i18n-html="s1_title"></h2>
    <p class="s-hint" data-i18n="s1_hint"></p>
    <div class="rating-block">
      <div class="rating-row"><span class="rating-label" data-i18n="r_atractivo"></span><div class="rating-opts"><input type="radio" name="r_atractivo" id="r_at1" value="1"><label for="r_at1">1</label><input type="radio" name="r_atractivo" id="r_at2" value="2"><label for="r_at2">2</label><input type="radio" name="r_atractivo" id="r_at3" value="3"><label for="r_at3">3</label><input type="radio" name="r_atractivo" id="r_at4" value="4"><label for="r_at4">4</label><input type="radio" name="r_atractivo" id="r_at5" value="5"><label for="r_at5">5</label></div></div>
      <div class="rating-row"><span class="rating-label" data-i18n="r_moda"></span><div class="rating-opts"><input type="radio" name="r_moda" id="r_mo1" value="1"><label for="r_mo1">1</label><input type="radio" name="r_moda" id="r_mo2" value="2"><label for="r_mo2">2</label><input type="radio" name="r_moda" id="r_mo3" value="3"><label for="r_mo3">3</label><input type="radio" name="r_moda" id="r_mo4" value="4"><label for="r_mo4">4</label><input type="radio" name="r_moda" id="r_mo5" value="5"><label for="r_mo5">5</label></div></div>
      <div class="rating-row"><span class="rating-label" data-i18n="r_comercial"></span><div class="rating-opts"><input type="radio" name="r_comercial" id="r_co1" value="1"><label for="r_co1">1</label><input type="radio" name="r_comercial" id="r_co2" value="2"><label for="r_co2">2</label><input type="radio" name="r_comercial" id="r_co3" value="3"><label for="r_co3">3</label><input type="radio" name="r_comercial" id="r_co4" value="4"><label for="r_co4">4</label><input type="radio" name="r_comercial" id="r_co5" value="5"><label for="r_co5">5</label></div></div>
      <div class="rating-row"><span class="rating-label" data-i18n="r_precio"></span><div class="rating-opts"><input type="radio" name="r_precio" id="r_pr1" value="1"><label for="r_pr1">1</label><input type="radio" name="r_precio" id="r_pr2" value="2"><label for="r_pr2">2</label><input type="radio" name="r_precio" id="r_pr3" value="3"><label for="r_pr3">3</label><input type="radio" name="r_precio" id="r_pr4" value="4"><label for="r_pr4">4</label><input type="radio" name="r_precio" id="r_pr5" value="5"><label for="r_pr5">5</label></div></div>
      <div class="rating-row"><span class="rating-label" data-i18n="r_equilibrio"></span><div class="rating-opts"><input type="radio" name="r_equilibrio" id="r_eq1" value="1"><label for="r_eq1">1</label><input type="radio" name="r_equilibrio" id="r_eq2" value="2"><label for="r_eq2">2</label><input type="radio" name="r_equilibrio" id="r_eq3" value="3"><label for="r_eq3">3</label><input type="radio" name="r_equilibrio" id="r_eq4" value="4"><label for="r_eq4">4</label><input type="radio" name="r_equilibrio" id="r_eq5" value="5"><label for="r_eq5">5</label></div></div>
      <div class="rating-row"><span class="rating-label" data-i18n="r_color"></span><div class="rating-opts"><input type="radio" name="r_color" id="r_cl1" value="1"><label for="r_cl1">1</label><input type="radio" name="r_color" id="r_cl2" value="2"><label for="r_cl2">2</label><input type="radio" name="r_color" id="r_cl3" value="3"><label for="r_cl3">3</label><input type="radio" name="r_color" id="r_cl4" value="4"><label for="r_cl4">4</label><input type="radio" name="r_color" id="r_cl5" value="5"><label for="r_cl5">5</label></div></div>
      <div class="rating-row"><span class="rating-label" data-i18n="r_relacion"></span><div class="rating-opts"><input type="radio" name="r_relacion" id="r_re1" value="1"><label for="r_re1">1</label><input type="radio" name="r_relacion" id="r_re2" value="2"><label for="r_re2">2</label><input type="radio" name="r_relacion" id="r_re3" value="3"><label for="r_re3">3</label><input type="radio" name="r_relacion" id="r_re4" value="4"><label for="r_re4">4</label><input type="radio" name="r_relacion" id="r_re5" value="5"><label for="r_re5">5</label></div></div>
    </div>
  </div>

  <!-- S2 -->
  <div class="section" data-sec="2">
    <p class="s-eyebrow" data-i18n="s2_eyebrow"></p>
    <h2 class="s-title" data-i18n-html="s2_title"></h2>
    <p class="s-hint" data-i18n="s2_hint"></p>
    <div class="family-grid" id="grid-success"></div>
    <div class="textarea-wrap">
      <span class="field-label" data-i18n="s2_why_lbl"></span>
      <textarea class="textarea-field" id="ex_porque" data-i18n-placeholder="s2_why_ph"></textarea>
    </div>
  </div>

  <!-- S3 -->
  <div class="section" data-sec="3">
    <p class="s-eyebrow" data-i18n="s3_eyebrow"></p>
    <h2 class="s-title" data-i18n-html="s3_title"></h2>
    <p class="s-hint" data-i18n="s3_hint"></p>
    <div class="family-grid" id="grid-weak"></div>
    <div class="textarea-wrap">
      <span class="field-label" data-i18n="s3_why_lbl"></span>
      <div class="check-group check-group-2col">
        <label class="check-row"><input type="checkbox" name="motivo" value="precio"><span class="check-ind"></span><span class="check-label" data-i18n="mot_precio"></span></label>
        <label class="check-row"><input type="checkbox" name="motivo" value="diseno"><span class="check-ind"></span><span class="check-label" data-i18n="mot_diseno"></span></label>
        <label class="check-row"><input type="checkbox" name="motivo" value="tendencia"><span class="check-ind"></span><span class="check-label" data-i18n="mot_tendencia"></span></label>
        <label class="check-row"><input type="checkbox" name="motivo" value="colorido"><span class="check-ind"></span><span class="check-label" data-i18n="mot_color"></span></label>
        <label class="check-row"><input type="checkbox" name="motivo" value="tejido"><span class="check-ind"></span><span class="check-label" data-i18n="mot_tejido"></span></label>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let currentLang = 'es';
const ranked = { success:{}, weak:{} };

// ═══════════════════════════════════════════════
// LANGUAGE
// ═══════════════════════════════════════════════
function setLang(lang) {
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  applyI18n();
  renderFamilyGrid('grid-success','success');
  renderFamilyGrid('grid-weak','weak');
  updateProgress();
  if (location.hash === '#admin') renderAdmin();
}

function applyI18n() {
  const d = LANGS[currentLang];
  if (!d) return;
  document.querySelectorAll('[data-i18n]').forEach(el => { const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.textContent=d[k]; });
  document.querySelectorAll('[data-i18n-html]').forEach(el => { const k=el.getAttribute('data-i18n-html'); if(d[k]!==undefined) el.innerHTML=d[k]; });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k=el.getAttribute('data-i18n-placeholder'); if(d[k]!==undefined) el.placeholder=d[k]; });
  const titles = {es:'LOSAN — Feedback AW26', en:'LOSAN — AW26 Feedback', it:'LOSAN — Feedback AW26'};
  document.title = titles[currentLang] || titles.es;
}

// ═══════════════════════════════════════════════
// FAMILY GRIDS (ranked selection)
// ═══════════════════════════════════════════════
function renderFamilyGrid(containerId, type) {
  const d = LANGS[currentLang];
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = FAMILIES.map(f => {
    const rank = ranked[type][f.id];
    const isRanked = rank !== undefined;
    return `<div class="fam-row${isRanked?' ranked':''}" onclick="toggleFamily('${f.id}','${type}')">
      <span class="fam-indicator">${isRanked ? rank : '—'}</span>
      <span class="fam-name">${d[f.id] || f.es}</span>
    </div>`;
  }).join('');
}

function toggleFamily(familyId, type) {
  if (ranked[type][familyId] !== undefined) {
    const removedRank = ranked[type][familyId];
    delete ranked[type][familyId];
    Object.keys(ranked[type]).forEach(id => { if(ranked[type][id]>removedRank) ranked[type][id]--; });
  } else {
    ranked[type][familyId] = Object.keys(ranked[type]).length + 1;
  }
  renderFamilyGrid(type==='success'?'grid-success':'grid-weak', type);
  updateProgress();
}

// ═══════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════
function updateProgress() {
  let filled = 0;
  if(document.querySelector('input[name^="r_"]:checked')) filled++;
  if(Object.keys(ranked.success).length>0) filled++;
  if(Object.keys(ranked.weak).length>0||document.querySelector('input[name="motivo"]:checked')) filled++;
  if(document.querySelector('input[name="carencia"]:checked')||v('car_otros')) filled++;
  if(v('sur_exceso')||v('sur_falta')) filled++;
  if(v('pre_caros')||v('pre_comp')||document.querySelector('input[name="pre_perdida"]:checked')) filled++;
  if(document.querySelector('input[name="fit"]:checked')) filled++;
  if(v('cp1')||v('cp2')) filled++;
  if(v('td1')||v('td2')) filled++;
  if(v('ref_falta')||v('ref_oport')) filled++;
  const pct = Math.round((filled/10)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('hd-meta').textContent = filled+' / 10';
}
document.addEventListener('input', updateProgress);
document.addEventListener('change', updateProgress);

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function v(id){ const e=document.getElementById(id); return e&&e.value.trim()?e.value.trim():'—'; }
function getRadio(name){ const e=document.querySelector(`input[name="${name}"]:checked`); return e?e.value:'—'; }
function getChecks(name){ const els=[...document.querySelectorAll(`input[name="${name}"]:checked`)]; return els.length?els.map(e=>e.value).join(', '):'—'; }

function getRankedList(type){
  const d = LANGS[currentLang];
  const byRank = Object.entries(ranked[type]).sort((a,b)=>a[1]-b[1]);
  if(!byRank.length) return '—';
  return byRank.map(([id,rank])=>`${rank}. ${d[id]||id}`).join('\n');
}

function getCheckedMotivos(){
  const d = LANGS[currentLang];
  const keys = {precio:'mot_precio',diseno:'mot_diseno',tendencia:'mot_tendencia',colorido:'mot_color',tejido:'mot_tejido',fit:'mot_fit',competencia:'mot_competencia',otro:'mot_otro'};
  const els = [...document.querySelectorAll('input[name="motivo"]:checked')];
  return els.length ? els.map(e=>d[keys[e.value]]||e.value).join(', ') : '—';
}

function getCheckedCarencias(){
  const d = LANGS[currentLang];
  const els = [...document.querySelectorAll('input[name="carencia"]:checked')];
  return els.length ? els.map(e=>d['f_'+e.value]||e.value).join(', ') : '—';
}

function getCheckedFit(){
  const d = LANGS[currentLang];
  const keys = {tallaje:'ft_tallaje',patronaje:'ft_patronaje',largo:'ft_largo',calidad:'ft_calidad',tejidos:'ft_tejidos',acabados:'ft_acabados',packaging:'Packaging',etiquetado:'ft_etiquetado'};
  const els = [...document.querySelectorAll('input[name="fit"]:checked')];
  return els.length ? els.map(e=>d[keys[e.value]]||e.value).join(', ') : '—';
}

function getYesNo(){
  const d = LANGS[currentLang];
  const e = document.querySelector('input[name="pre_perdida"]:checked');
  if(!e) return '—';
  return {si:d.yn_yes, no:d.yn_no, algunos:d.yn_some}[e.value] || e.value;
}

  document.querySelectorAll('input[type="text"],textarea').forEach(e=>e.value='');

  document.getElementById('m_fecha').valueAsDate=new Date();

function submitForm() {
  const agentName = document.getElementById('m_agente').value.trim();
  const d = LANGS[currentLang];
  if (!agentName) {
    alert(d.submit_warn || 'Please enter your name before sending.');
    document.getElementById('m_agente').focus();
    return;
  }
  // Build text and open email
  exportar(); // builds textoExportado
  enviarEmail();
  // Show success overlay
  applyI18n();
  document.getElementById('submitOverlay').classList.add('active');
}

function closeSubmitOverlay() {
  document.getElementById('submitOverlay').classList.remove('active');
  cerrarModal();
}

// ═══════════════════════════════════════════════
// ADMIN ROUTING
// ═══════════════════════════════════════════════
function route() {
  const isAdmin = location.hash === '#admin';
  const mainEl = document.querySelector('.progress-bar');
  const formEl = document.querySelector('main.form-body');
  const actionsEl = document.querySelector('.actions-bar');
  const headerEl = document.querySelector('header.header');

  if (isAdmin) {
    if(mainEl) mainEl.style.display='none';
    if(formEl) formEl.style.display='none';
    if(actionsEl) actionsEl.style.display='none';
    if(headerEl) headerEl.style.display='none';
    document.getElementById('admin-view').style.display='block';
    renderAdmin();
    // sync lang buttons in admin header
    document.querySelectorAll('#admin-view .lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
  } else {
    if(mainEl) mainEl.style.display='';
    if(formEl) formEl.style.display='';
    if(actionsEl) actionsEl.style.display='';
    if(headerEl) headerEl.style.display='';
    document.getElementById('admin-view').style.display='none';
  }
}

function goToForm() {
  history.pushState('', document.title, location.pathname + location.search);
  route();
}

function renderAdmin() {
  const d = LANGS[currentLang];
  // sync lang buttons
  document.querySelectorAll('#admin-view .lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
  // apply i18n inside admin view
  document.querySelectorAll('#admin-view [data-i18n]').forEach(el => { const k=el.getAttribute('data-i18n'); if(d[k]!==undefined) el.textContent=d[k]; });
  // generate export text
  exportar(); // populates textoExportado
  const txt = document.getElementById('textoExportado').textContent;
  document.getElementById('adminPre').textContent = txt;
  cerrarModal(); // close the modal that exportar() opened
}

function adminCopy() {
  const txt = document.getElementById('adminPre').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('adminCopyBtn');
    const orig = btn.textContent;
    btn.textContent = '✓ '+(currentLang==='it'?'Copiato!':currentLang==='en'?'Copied!':'Copiado');
    setTimeout(()=>{ btn.textContent=orig; }, 2200);
  });
}

function adminDownload() {
  const txt = document.getElementById('adminPre').textContent;
  const agent = document.getElementById('m_agente').value.trim() || 'agente';
  const blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `LOSAN_AW26_${agent.replace(/\s+/g,'_')}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
}

window.addEventListener('hashchange', route);

  setLang(['es','en','it'].includes(nav) ? nav : 'es');
  route();
});
